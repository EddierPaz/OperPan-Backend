{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña | OperPan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/login/password_reset.css' %}">
</head>
<body>
<div class="reset-card">
    <img src="{% static 'img/LOGO EMPRESA.png' %}" class="logo">
    <h2>Nueva contraseña</h2>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-icon position-relative">
            <input type="password" class="form-control" name="password" id="passwordInput"
                placeholder="Nueva contraseña" required>
            <i class="bi bi-eye-slash toggle-password" id="togglePassword1"
               style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;"></i>
        </div>

        <div class="input-icon position-relative mt-2">
            <input type="password" class="form-control" name="confirmar_password" id="confirmarPasswordInput"
                placeholder="Confirmar contraseña" required>
            <i class="bi bi-eye-slash toggle-password" id="togglePassword2"
               style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;"></i>
        </div>

        <button class="btn-reset mt-3">
            <i class="bi bi-check-circle-fill"></i> Guardar contraseña
        </button>
    </form>
</div>

<script>
    function toggleVisibility(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        icon.addEventListener('click', () => {
            const esOculto = input.type === 'password';
            input.type = esOculto ? 'text' : 'password';
            icon.classList.toggle('bi-eye-slash', !esOculto);
            icon.classList.toggle('bi-eye', esOculto);
        });
    }

    toggleVisibility('passwordInput', 'togglePassword1');
    toggleVisibility('confirmarPasswordInput', 'togglePassword2');
</script>
</body>
</html>
