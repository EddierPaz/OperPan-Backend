{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Recuperar contraseña | OperPan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/login/password_reset.css' %}">

</head>

<body>

<div class="reset-card">

    <img src="{% static 'img/LOGO EMPRESA.png' %}" class="logo">

    <h2>Recuperar contraseña</h2>

    <p>

        Ingresa tu número de documento. Si existe un usuario asociado, recibirás un enlace mediante el correo registrado para restablecer tu contraseña.

    </p>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            class="form-control"
            name="documento"
            placeholder="Número de documento"
            required
        >

        <button class="btn-reset">

            <i class="bi bi-envelope-fill"></i>

            Enviar enlace

        </button>

    </form>

    <div class="back-login">

        <a href="{% url 'login' %}">

            <i class="bi bi-arrow-left"></i>

            Volver al inicio de sesión

        </a>

    </div>

</div>

</body>

</html>
