<!-- MODAL: Editar horario -->
<!-- Los campos se llenan por JS con fetch, no necesitan contexto de Django -->
<div class="modal fade" id="modalEditarHorario" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Editar horario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form method="POST" id="formEditar" action="">
          {% csrf_token %}
          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label">Empleado</label>
              <input id="editar-empleado" class="form-control" type="text" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label">Cargo</label>
              <input id="editar-cargo" class="form-control" type="text" readonly>
            </div>

            <div class="col-md-4">
              <label class="form-label">Jornada *</label>
              <select id="editar-turno" name="turno" class="form-select" required>
                <option value="MANANA">Mañana</option>
                <option value="TARDE">Tarde</option>
                <option value="FIJO">Fijo</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Hora entrada</label>
              <input id="editar-entrada" type="time" name="hora_entrada" class="form-control" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Hora salida</label>
              <input id="editar-salida" type="time" name="hora_salida" class="form-control" required>
            </div>

            <div class="col-12">
              <label class="form-label">
                Cambiar día de descanso
                <span id="descanso-actual-label" class="text-muted fw-normal"></span>
              </label>
              <div class="calendario-wrapper" id="ciclo14x1Editar">
                <div class="dias-semana">
                  {% for nombre in dias_semana %}
                  <div class="dia-semana">{{ nombre }}</div>
                  {% endfor %}
                </div>
                <div class="calendario-grid">
                  {% for dia in proximos_dias %}
                  {% if dia %}
                  <button type="button" class="dia-btn" data-fecha="{{ dia.fecha|date:'Y-m-d' }}"
                    data-label="{{ dia.fecha|date:'d/m' }}" data-indice="{{ dia.indice }}"
                    title="{{ dia.fecha|date:'d/m/Y' }}">
                    {{ dia.numero }}
                  </button>
                  {% else %}
                  <div class="dia-vacio"></div>
                  {% endif %}
                  {% endfor %}
                </div>
                <input type="hidden" name="fecha_descanso" id="fechaDescansoEditarInput">
                <p class="text-muted small mt-2" id="descansoEditarLabel" style="display:none;">
                  <i class="bi bi-check-circle-fill text-success me-1"></i>
                  Nuevo descanso: <strong id="descansoEditarFechaTexto"></strong>
                </p>
              </div>
            </div>

          </div>

          <div class="d-flex mt-4 gap-2">
            <button type="submit" class="btn btn-primary-corporate">
              <i class="bi bi-save"></i> Guardar cambios
            </button>
            <button type="button" class="btn btn-outline-corporate" data-bs-dismiss="modal">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
