<div class="form-section" id="formularioCuenta" style="display:none;"
    data-open="{% if messages %}true{% else %}false{% endif %}">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="formTitulo"><i class="bi bi-person-plus-fill me-2"></i> Crear Usuario</h3>
        <button type="button" class="btn btn-outline-secondary rounded-pill px-3" id="btnCerrarFormulario">
            <i class="bi bi-x-lg me-1"></i> Cerrar
        </button>
    </div>

    <form method="POST" id="formCuenta" action="{% url 'user_list' %}">
        {% csrf_token %}

        <!-- DATOS PERSONALES -->
        <h5 class="mb-3 text-danger">
            <i class="bi bi-person-vcard me-1"></i> Datos Personales
        </h5>
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Primer Nombre *</label>
                <input type="text" class="form-control" name="primer_nombre" id="f_primer_nombre" value="{{ request.POST.primer_nombre|default:'' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Segundo Nombre</label>
                <input type="text" class="form-control" name="segundo_nombre" id="f_segundo_nombre" value="{{ request.POST.segundo_nombre|default:'' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Primer Apellido *</label>
                <input type="text" class="form-control" name="primer_apellido" id="f_primer_apellido" value="{{ request.POST.primer_apellido|default:'' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Segundo Apellido *</label>
                <input type="text" class="form-control" name="segundo_apellido" id="f_segundo_apellido" value="{{ request.POST.segundo_apellido|default:'' }}" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Tipo Documento *</label>
                <select class="form-select" name="tipo_documento" id="f_tipo_documento" required>
                    <option value="">Seleccione</option>
                    <option value="CC" {% if request.POST.tipo_documento == "CC" %}selected{% endif %}>Cédula de Ciudadanía</option>
                    <option value="CE" {% if request.POST.tipo_documento == "CE" %}selected{% endif %}>Cédula de Extranjería</option>
                    <option value="TI" {% if request.POST.tipo_documento == "TI" %}selected{% endif %}>Tarjeta de Identidad</option>
                    <option value="PA" {% if request.POST.tipo_documento == "PA" %}selected{% endif %}>Pasaporte</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label {% if perfil_form.numero_documento.errors %}is-invalid{% endif %}">Número Documento *</label>
                <input type="text" class="form-control" name="numero_documento" id="f_numero_documento" value="{{ request.POST.numero_documento|default:'' }}" required>
                {% for error in perfil_form.numero_documento.errors %}
                    <div class="invalid-feedback d-block">
                        {{ error }}
                    </div>
                {% endfor %}
            </div>
            <div class="col-md-3">
                <label class="form-label">Fecha Nacimiento *</label>
                <input type="date" class="form-control" name="fecha_nacimiento" id="f_fecha_nacimiento" value="{{ request.POST.fecha_nacimiento|default:'' }}" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Género *</label>
                <select class="form-select" name="genero" id="f_genero" required>
                    <option value="">Seleccione</option>
                    <option value="M" {% if request.POST.genero == "M" %}selected{% endif %}>Masculino</option>
                    <option value="F" {% if request.POST.genero == "F" %}selected{% endif %}>Femenino</option>
                    <option value="O" {% if request.POST.genero == "O" %}selected{% endif %}>Otro</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Estado Civil *</label>
                <select class="form-select" name="estado_civil" id="f_estado_civil" required>
                    <option value="">Seleccione</option>
                    <option value="soltero" {% if request.POST.estado_civil == "soltero" %}selected{% endif %}>Soltero</option>
                    <option value="casado" {% if request.POST.estado_civil == "casado" %}selected{% endif %}>Casado</option>
                    <option value="union_libre" {% if request.POST.estado_civil == "union_libre" %}selected{% endif %}>Unión Libre</option>
                    <option value="divorciado" {% if request.POST.estado_civil == "divorciado" %}selected{% endif %}>Divorciado</option>
                    <option value="viudo" {% if request.POST.estado_civil == "viudo" %}selected{% endif %}>Viudo</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Tipo de Sangre *</label>
                <select class="form-select" name="tipo_sangre" id="f_tipo_sangre" required>
                    <option value="">Seleccione</option>
                    <option value="O+" {% if request.POST.tipo_sangre == "O+" %}selected{% endif %}>O+</option>
                    <option value="O-" {% if request.POST.tipo_sangre == "O-" %}selected{% endif %}>O-</option>
                    <option value="A+" {% if request.POST.tipo_sangre == "A+" %}selected{% endif %}>A+</option>
                    <option value="A-" {% if request.POST.tipo_sangre == "A-" %}selected{% endif %}>A-</option>
                    <option value="B+" {% if request.POST.tipo_sangre == "B+" %}selected{% endif %}>B+</option>
                    <option value="B-" {% if request.POST.tipo_sangre == "B-" %}selected{% endif %}>B-</option>
                    <option value="AB+" {% if request.POST.tipo_sangre == "AB+" %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if request.POST.tipo_sangre == "AB-" %}selected{% endif %}>AB-</option>
                </select>
            </div>
        </div>

        <hr class="my-4">

        <!-- CONTACTO -->
        <h5 class="mb-3 text-danger">
            <i class="bi bi-telephone me-1"></i> Información de Contacto
        </h5>
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Teléfono *</label>
                <input type="tel" class="form-control" name="telefono" id="f_telefono" value="{{ request.POST.telefono|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Correo *</label>
                <input type="email" class="form-control" name="correo" id="f_correo" value="{{ request.POST.correo|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Ciudad *</label>
                <input type="text" class="form-control" name="ciudad" id="f_ciudad" value="{{ request.POST.ciudad|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Dirección *</label>
                <input type="text" class="form-control" name="direccion" id="f_direccion" value="{{ request.POST.direccion|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Nombre del contacto de emergencia</label>
                <input type="text" class="form-control" name="contacto_emergencia" id="f_contacto_emergencia" value="{{ request.POST.contacto_emergencia|default:'' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Parentesco *</label>
                <input type="text" class="form-control" name="parentesco_emergencia" id="f_parentesco_emergencia" value="{{ request.POST.parentesco_emergencia|default:'' }}" required>       
            </div>
            <div class="col-md-4">
                <label class="form-label">Teléfono del contacto de emergencia </label>
                <input type="tel" class="form-control" name="telefono_emergencia" id="f_telefono_emergencia" value="{{ request.POST.telefono_emergencia|default:'' }}" required>
            </div>
        </div>

        <hr class="my-4">

        <!-- DATOS LABORALES -->
        <h5 class="mb-3 text-danger">
            <i class="bi bi-briefcase me-1"></i> Datos Laborales
        </h5>
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">Cargo *</label>
                <select class="form-select" name="cargo" id="f_cargo" required>
                    <option value="">Seleccione</option>
                    <option value="mesero" {% if request.POST.cargo == "mesero" %}selected{% endif %}>Mesero</option>
                    <option value="cajero" {% if request.POST.cargo == "cajero" %}selected{% endif %}>Cajero</option>
                    <option value="pastelero" {% if request.POST.cargo == "pastelero" %}selected{% endif %}>Pastelero</option>
                    <option value="panadero" {% if request.POST.cargo == "panadero" %}selected{% endif %}>Panadero</option>
                    <option value="cocina" {% if request.POST.cargo == "cocina" %}selected{% endif %}>Cocina</option>
                    <option value="buñuelero" {% if request.POST.cargo == "buñuelero" %}selected{% endif %}>Buñuelero</option>
                    <option value="greca" {% if request.POST.cargo == "greca" %}selected{% endif %}>Greca</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Fecha Ingreso *</label>
                <input type="date" class="form-control" name="fecha_ingreso" id="f_fecha_ingreso" value="{{ request.POST.fecha_ingreso|default:'' }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">EPS *</label>
                <input type="text" class="form-control" name="eps" id="f_eps" value="{{ request.POST.eps|default:'' }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">ARL *</label>
                <input type="text" class="form-control" name="arl" id="f_arl" value="{{ request.POST.arl|default:'' }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Fondo Pensión *</label>
                <input type="text" class="form-control" name="fondo_pension" id="f_fondo_pension" value="{{ request.POST.fondo_pension|default:'' }}" required>
            </div>
            <div class="col-md-3" id="campoEstado" style="display:none;">
                <label class="form-label">Estado *</label>
                <select class="form-select" name="estado" id="f_estado">
                    <option value="activo" {% if request.POST.estado == "activo" %}selected{% endif %}>Activo</option>
                    <option value="suspendido" {% if request.POST.estado == "suspendido" %}selected{% endif %}>Suspendido</option>
                    <option value="retirado" {% if request.POST.estado == "retirado" %}selected{% endif %}>Retirado</option>
                </select>
            </div>
        </div>

        <hr class="my-4">

        <!-- ACCESO AL SISTEMA -->
        <h5 class="mb-3 text-danger">
            <i class="bi bi-shield-lock me-1"></i> Acceso al Sistema
        </h5>
        <div class="row g-3">
            <div class="col-md-4" id="campoUsername">
                <label class="form-label {% if user_form.username.errors %}is-invalid{% endif %}">Usuario *</label>
                <input type="text" class="form-control" name="username" id="f_username" value="{{ request.POST.username|default:'' }}" required>
                {% for error in user_form.username.errors %}
                    <div class="invalid-feedback d-block">
                        {{ error }}
                    </div>
                {% endfor %}
            </div>
            <div class="col-md-4" id="campoPassword">
                <label class="form-label">Contraseña *</label>
                <input type="password" class="form-control" name="password" id="f_password" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Rol *</label>
                <select class="form-select" name="rol" id="f_rol" required>
                    <option value="">Seleccione</option>
                    <option value="admin" {% if request.POST.rol == "admin" %}selected{% endif %}>Administrador</option>
                    <option value="empleado" {% if request.POST.rol == "empleado" %}selected{% endif %}>Empleado</option>
                </select>
            </div>
        </div>

        <div class="mt-4 d-flex gap-3">
            <button type="submit" class="btn-primary-corporate" id="btnGuardar">
                <i class="bi bi-save me-1"></i> Guardar Usuario
            </button>
            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="btnLimpiar">
                Limpiar
            </button>
        </div>

    </form>
</div>
