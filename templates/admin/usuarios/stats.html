<div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
  <h3><i class="bi bi-calendar-check me-2"></i>Asistencia de hoy</h3>
  <span>{{ fecha_hoy|date:"l, d \d\e F \d\e Y" }}</span>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="stat-card d-flex justify-content-between align-items-center">
            <div>
                <span class="text-muted">Usuarios registrados</span>
                <h3 class="mt-1">{{ total_usuarios }}</h3>
            </div>
            <div class="icono-circular">
                <i class="bi bi-people-fill fs-2 text-primary"></i>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="stat-card d-flex justify-content-between align-items-center">
            <div>
                <span class="text-muted">Administradores</span>
                <h3 class="mt-1">{{ total_admins }}</h3>
            </div>
            <div class="icono-circular">
                <i class="bi bi-shield-lock-fill fs-2" style="color:#17bd62;"></i>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card d-flex justify-content-between align-items-center">
            <div>
                <span class="text-muted">Empleados</span>
                <h3 class="mt-1">{{ total_empleados }}</h3>
            </div>
            <div class="icono-circular">
                <i class="bi bi-person-workspace fs-2 text-primary"></i>
            </div>
        </div>
    </div>
</div>
